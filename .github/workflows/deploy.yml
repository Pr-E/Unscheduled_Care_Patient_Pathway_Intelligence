name: CI/CD Pipeline for NHS Unscheduled Care Intelligence

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.ECR_REPOSITORY }} .

      - name: Tag Docker image
        run: |
          docker tag ${{ secrets.ECR_REPOSITORY }}:latest \
          ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Push Docker image to ECR
        run: |
          docker push ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest



      - name: Deploy to EC2 using SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region ${{ secrets.AWS_REGION }} \
            --instance-ids "i-03805a1e5c0f2efa2" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy NHS Unscheduled Care Intelligence Platform" \
            --parameters 'commands=[
              "set -e",
              "echo Stopping named container...",
              "docker stop unscheduled-care-app || true",
              "docker rm -f unscheduled-care-app || true",

              "echo Removing any container using port 8000 or 8501...",
              "docker ps -aq --filter publish=8000 | xargs -r docker rm -f || true",
              "docker ps -aq --filter publish=8501 | xargs -r docker rm -f || true",

              "echo Checking port users...",
              "sudo fuser -k 8000/tcp || true",
              "sudo fuser -k 8501/tcp || true",

              "echo Docker disk before cleanup:",
              "df -h",
              "docker system df || true",

              "echo Cleaning Docker cache...",
              "docker system prune -af --volumes || true",

              "echo Logging into ECR...",
              "aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 453355738692.dkr.ecr.us-east-1.amazonaws.com",

              "echo Pulling latest image...",
              "docker pull 453355738692.dkr.ecr.us-east-1.amazonaws.com/unscheduled-care-app:latest",

              "echo Running new container...",
              "docker run -d --name unscheduled-care-app --restart unless-stopped -p 8000:8000 -p 8501:8501 -e USE_S3=true -e AWS_REGION=us-east-1 -e S3_BUCKET_NAME=unscheduled-care-patient-pathway-intelligence -e MODEL_LOADING_MODE=local -e API_BASE_URL=http://54.158.220.0:8000 -e MLFLOW_TOKEN=${{ secrets.MLFLOW_TOKEN }} -e MLFLOW_TRACKING_USERNAME=${{ secrets.MLFLOW_TOKEN }} -e MLFLOW_TRACKING_PASSWORD=${{ secrets.MLFLOW_TOKEN }} 453355738692.dkr.ecr.us-east-1.amazonaws.com/unscheduled-care-app:latest",

              "echo Deployment complete.",
              "docker ps -a"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          set +e
          aws ssm wait command-executed \
            --region ${{ secrets.AWS_REGION }} \
            --command-id "$COMMAND_ID" \
            --instance-id "i-03805a1e5c0f2efa2"
          WAITER_STATUS=$?
          set -e

          aws ssm get-command-invocation \
            --region ${{ secrets.AWS_REGION }} \
            --command-id "$COMMAND_ID" \
            --instance-id "i-03805a1e5c0f2efa2"

          exit $WAITER_STATUS
