name: CI/CD Pipeline for NHS Unscheduled Care Intelligence

on:
  push:
    branches:
      - main

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
      EC2_INSTANCE_ID: i-0feb0c2590ab2ce71
      EC2_HOST: ${{ secrets.EC2_HOST }}
      S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region "$AWS_REGION" \
          | docker login --username AWS --password-stdin "$ECR_REGISTRY"

      - name: Build Docker image
        run: |
          docker build -t "$ECR_REPOSITORY" .

      - name: Tag Docker image
        run: |
          docker tag "$ECR_REPOSITORY:latest" \
          "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Push Docker image to ECR
        run: |
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Deploy to EC2 using SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --region "$AWS_REGION" \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy NHS Unscheduled Care Intelligence Platform" \
            --parameters commands='[
              "set -e",
              "echo Stopping existing application container...",
              "docker stop unscheduled-care-app || true",
              "docker rm -f unscheduled-care-app || true",
              "echo Removing containers bound to ports...",
              "docker ps -aq --filter publish=8000 | xargs -r docker rm -f || true",
              "docker ps -aq --filter publish=8501 | xargs -r docker rm -f || true",
              "echo Releasing host ports...",
              "sudo lsof -ti:8000 | xargs -r sudo kill -9 || true",
              "sudo lsof -ti:8501 | xargs -r sudo kill -9 || true",
              "sleep 3",
              "echo Cleaning Docker resources...",
              "docker system prune -af --volumes || true",
              "echo Logging into ECR...",
              "aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | docker login --username AWS --password-stdin ${{ secrets.ECR_REGISTRY }}",
              "echo Pulling latest image...",
              "docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest",
              "echo Starting application container...",
              "docker run -d --name unscheduled-care-app --restart unless-stopped -p 8000:8000 -p 8501:8501 -e USE_S3=true -e AWS_REGION=${{ secrets.AWS_REGION }} -e S3_BUCKET_NAME=${{ secrets.S3_BUCKET_NAME }} -e MODEL_LOADING_MODE=s3 -e API_BASE_URL=http://${{ secrets.EC2_HOST }}:8000 -e DAGSHUB_REPO_OWNER=${{ secrets.DAGSHUB_REPO_OWNER }} -e DAGSHUB_REPO_NAME=${{ secrets.DAGSHUB_REPO_NAME }} -e MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }} -e MLFLOW_TRACKING_USERNAME=${{ secrets.MLFLOW_TRACKING_USERNAME }} -e MLFLOW_TRACKING_PASSWORD=${{ secrets.MLFLOW_TRACKING_PASSWORD }} -e MLFLOW_TOKEN=${{ secrets.MLFLOW_TOKEN }} -e GIT_PYTHON_REFRESH=quiet ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest",
              "echo Deployment complete.",
              "docker ps -a"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          set +e
          aws ssm wait command-executed \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID"
          WAITER_STATUS=$?
          set -e

          aws ssm get-command-invocation \
            --region "$AWS_REGION" \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID"

          exit $WAITER_STATUS